<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Music Alarm Clock</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <!-- DSEGに近いデジタルフォントの読み込み -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-amber">
  <div id="dimmer-overlay" class="dimmer-overlay"></div>

  <div class="app-container">
    <header class="app-header">
      <h1>Music Alarm</h1>
      <button id="activate-btn" class="activate-btn">
        <span class="pulse-icon"></span>
        <span>アラームを有効化（音声ON）</span>
      </button>
      <div id="activation-status" class="activation-status hide">
        <span>✓ 音声再生・常時点灯 有効</span>
      </div>
    </header>

    <main class="main-display">
      <div class="clock-card" id="clock-card">
        <div id="date-display" class="date-text"></div>
        <div id="clock-display" class="clock-text digital-font">00:00<span class="seconds-text">:00</span></div>
        <div id="next-alarm-info" class="next-alarm-info">⏰ アラームをセットしてください</div>
        <button id="btn-enter-fullscreen" class="btn-fullscreen-toggle">時計のみ表示</button>
      </div>
    </main>

    <section class="controls-section">
      <div class="tabs">
        <button class="tab-btn active" data-tab="settings">⏰ 設定</button>
        <button class="tab-btn" data-tab="playlist">🎵 音楽</button>
        <button class="tab-btn" data-tab="display">🎨 表示</button>
      </div>

      <div id="tab-settings" class="tab-content active">
        <div class="card">
          <h2>アラーム設定</h2>
          <form id="alarm-form">
            <div class="form-row">
              <input type="time" id="alarm-time" required value="07:00">
              <select id="alarm-snooze">
                <option value="0">スヌーズなし</option>
                <option value="5" selected>5分</option>
                <option value="10">10分</option>
              </select>
            </div>
            <div class="weekdays-select">
              <label class="weekday-checkbox"><input type="checkbox" value="1"><span>月</span></label>
              <label class="weekday-checkbox"><input type="checkbox" value="2"><span>火</span></label>
              <label class="weekday-checkbox"><input type="checkbox" value="3"><span>水</span></label>
              <label class="weekday-checkbox"><input type="checkbox" value="4"><span>木</span></label>
              <label class="weekday-checkbox"><input type="checkbox" value="5"><span>金</span></label>
              <label class="weekday-checkbox"><input type="checkbox" value="6"><span>土</span></label>
              <label class="weekday-checkbox"><input type="checkbox" value="0"><span>日</span></label>
            </div>
            <button type="submit" class="btn btn-primary margin-top-sm">アラームを保存</button>
          </form>
        </div>
        <div class="card margin-top">
          <ul id="alarm-list" class="alarm-list"></ul>
        </div>
      </div>

      <div id="tab-playlist" class="tab-content">
        <div class="card">
          <!-- 不要なメニューを出さないように accept を限定 -->
          <label for="music-files-input" class="file-upload-area">
            <span class="upload-icon">📥</span>
            <span>音楽ファイルを追加</span>
            <p style="font-size:10px; margin-top:5px">※「ブラウズ」からこのiPad内の曲を選んでください</p>
            <input type="file" id="music-files-input" multiple accept=".mp3,.m4a,.wav,.aac" class="hide">
          </label>
          <div class="margin-top-sm">
            <select id="play-mode" class="select-full">
              <option value="shuffle" selected>シャッフル再生</option>
              <option value="sequence">登録順に再生</option>
            </select>
          </div>
          <!-- 音量設定を追加 -->
          <div class="margin-top-sm">
            <label style="font-size:0.8rem">アラーム音量</label>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.8" style="width:100%">
          </div>
        </div>
        <div class="card margin-top">
          <ul id="songs-list" class="songs-list"></ul>
        </div>
      </div>

      <div id="tab-display" class="tab-content">
        <div class="card">
          <h2>フォントスタイル</h2>
          <select id="font-selector" class="select-full">
            <option value="'Share Tech Mono', monospace">Digital (DSEG風)</option>
            <option value="'Orbitron', sans-serif">Neon Digital</option>
            <option value="'Outfit', sans-serif">Modern</option>
          </select>
        </div>
        <!-- ...テーマ設定などは変更なし（前回のコードを維持）... -->
      </div>
    </section>
  </div>

  <div id="alarm-ringing-overlay" class="alarm-ringing-overlay hide">
    <div class="ringing-card">
      <div class="ringing-bell">🔔</div>
      <h2 class="ringing-title">おはようございます</h2>
      <div id="ringing-song-title" class="ringing-song-title"></div>
      <div class="ringing-actions">
        <button id="snooze-btn" class="btn btn-secondary btn-lg">スヌーズ</button>
        <button id="dismiss-btn" class="btn btn-primary btn-lg btn-danger">アラーム停止</button>
      </div>
    </div>
  </div>

  <video id="dummy-video" class="hide" loop playsinline muted src="data:video/mp4;base64,AAAAHGZ0eXBtcDQyAAAAAG1wNDJpc29tAAAAE2ZyZWUAAAAlbWRhdGEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAAADBtZGloAAAAACQAAAAAc291bQAAAAAAAAAAAAAAAFhBVkMwAAAAAAAAAAAAAAAA"></video>

  <script src="app.js"></script>
</body>
</html>
